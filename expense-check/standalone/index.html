<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>支出チェック</title>
    <meta name="description" content="月ごとの支出を入力して、内訳をカラフルなグラフでチェックできる家計簿" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      @font-face {
        font-family: 'Space Grotesk';
        src: url('https://fonts.gstatic.com/s/spacegrotesk/v16/V8mQoQDjQSkFtoMM3T6r8E7mF71Q-gOoraIAEj62UXskpdGuM-DR.woff2')
          format('woff2');
        font-weight: 300 700;
        font-display: swap;
      }
      :root {
        /* ベース */
        --color-bg: #fff8fb;
        --color-surface: #ffffff;
        --color-surface-sub: #f6f3ff;
        --color-fg: #2b2350;
        --color-muted: #7a749a;
        --color-border: #efe7fb;

        /* ポップなアクセント */
        --pink: #ff5d9e;
        --pink-text: #d6256f;
        --grape: #8b5cf6;
        --grape-text: #6d28d9;
        --sky: #38bdf8;
        --grad-hero: linear-gradient(135deg, #ffe1f1 0%, #e7ddff 50%, #d9f3ff 100%);
        --grad-primary: linear-gradient(135deg, #ff5d9e 0%, #8b5cf6 100%);
        --grad-total: linear-gradient(135deg, #fff0f7 0%, #f0ebff 100%);

        /* カラフルなカテゴリパレット（循環割当） */
        --c1: #ff6b9d; --c2: #ffa63d; --c3: #ffd23f; --c4: #4ad991;
        --c5: #38bdf8; --c6: #8b5cf6; --c7: #f472b6; --c8: #2dd4bf;

        --font-sans: 'Space Grotesk', 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif;
        --font-num: 'Space Grotesk', 'SF Mono', ui-monospace, monospace;
        --fs-caption: clamp(0.75rem, 0.7rem + 0.1vw, 0.8125rem);
        --fs-body: clamp(0.95rem, 0.9rem + 0.15vw, 1.0625rem);
        --fs-h3: clamp(1.2rem, 1.05rem + 0.5vw, 1.45rem);
        --fs-h1: clamp(2rem, 1.6rem + 1.8vw, 3rem);
        --fs-num-lg: clamp(2rem, 1.5rem + 2vw, 3.25rem);
        --sp-1: 4px; --sp-2: 8px; --sp-3: 16px; --sp-4: 24px; --sp-5: 32px; --sp-6: 56px;
        --radius: 22px; --radius-sm: 12px;
        --shadow-card: 0 6px 20px rgba(139, 92, 246, 0.10), 0 2px 6px rgba(255, 93, 158, 0.08);
        --shadow-pop: 0 10px 24px rgba(255, 93, 158, 0.30);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--color-bg);
        color: var(--color-fg);
        font-family: var(--font-sans);
        font-size: var(--fs-body);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3 { margin: 0; font-weight: 700; line-height: 1.25; }
      h1 { font-size: var(--fs-h1); }
      h3 { font-size: var(--fs-h3); }
      p { margin: 0; }
      .num { font-family: var(--font-num); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
      .caption { font-size: var(--fs-caption); color: var(--color-muted); }
      .container { width: 100%; max-width: 1040px; margin: 0 auto; padding: 0 var(--sp-4); }
      .card {
        background: var(--color-surface);
        border: 2px solid var(--color-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
      }
      input:focus-visible, button:focus-visible {
        outline: 3px solid var(--grape); outline-offset: 2px;
      }
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

      /* ヘッダー */
      .site-header { padding: var(--sp-4) 0 0; }
      .site-header__inner { display: flex; align-items: center; gap: var(--sp-2); }
      .site-header__logo { display: inline-flex; align-items: center; gap: var(--sp-2); font-weight: 700; font-size: 1.2rem; color: var(--color-fg); }
      .site-header__mark {
        display: inline-grid; place-items: center; width: 34px; height: 34px;
        border-radius: 12px; background: var(--grad-primary); color: #fff;
        font-size: 1.1rem; box-shadow: var(--shadow-pop);
      }

      /* Hero */
      .hero { background: var(--grad-hero); border-radius: var(--radius); margin: var(--sp-4) 0; padding: var(--sp-5); }
      .hero__title { margin-bottom: var(--sp-2); }
      .hero__title .accent {
        background: var(--grad-primary); -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hero__lead { color: var(--color-muted); max-width: 540px; }

      /* 月切替バー */
      .monthbar {
        display: flex; align-items: center; justify-content: center; gap: var(--sp-3);
        margin: var(--sp-4) 0;
      }
      .monthbar__btn {
        width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--color-border);
        background: var(--color-surface); color: var(--grape-text); font-size: 1.3rem; font-weight: 700;
        cursor: pointer; display: grid; place-items: center; transition: transform 0.12s ease, box-shadow 0.12s ease;
      }
      .monthbar__btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-card); }
      .monthbar__month {
        font-family: var(--font-num); font-size: 1.25rem; font-weight: 700;
        border: 2px solid var(--color-border); border-radius: 999px;
        padding: var(--sp-2) var(--sp-4); background: var(--color-surface); color: var(--color-fg);
        cursor: pointer;
      }
      .monthbar__month::-webkit-calendar-picker-indicator { cursor: pointer; }

      /* メイングリッド */
      .sim { padding-bottom: var(--sp-5); }
      .sim__grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: var(--sp-4); align-items: start; }
      .panel { padding: var(--sp-4); }
      .panel__head { display: flex; align-items: center; justify-content: space-between; gap: var(--sp-2); margin-bottom: var(--sp-3); }
      .panel__title { font-size: var(--fs-h3); display: inline-flex; align-items: center; gap: var(--sp-2); }

      /* 項目リスト */
      .items { display: flex; flex-direction: column; gap: var(--sp-2); }
      .item {
        display: grid; grid-template-columns: 16px 1fr 8.5rem 36px; align-items: center; gap: var(--sp-2);
        background: var(--color-surface-sub); border-radius: var(--radius-sm); padding: var(--sp-2) var(--sp-3);
        border: 2px solid transparent; transition: border-color 0.12s ease;
      }
      .item:focus-within { border-color: var(--grape); }
      .item__dot { width: 16px; height: 16px; border-radius: 50%; }
      .item__label {
        border: 0; background: transparent; font-family: var(--font-sans); font-size: var(--fs-body);
        font-weight: 600; color: var(--color-fg); width: 100%; padding: var(--sp-1);
      }
      .item__label:focus { outline: none; }
      .item__amount { display: inline-flex; align-items: center; gap: 2px; justify-content: flex-end; }
      .item__yen { color: var(--color-muted); font-family: var(--font-num); }
      .item__input {
        width: 6.5rem; border: 0; background: transparent; text-align: right;
        font-family: var(--font-num); font-variant-numeric: tabular-nums; font-size: var(--fs-body); color: var(--color-fg);
      }
      .item__input:focus { outline: none; }
      .item__del {
        width: 32px; height: 32px; border-radius: 50%; border: 0; cursor: pointer;
        background: #fff; color: var(--pink-text); font-size: 1.1rem; line-height: 1;
        display: grid; place-items: center; transition: background 0.12s ease, transform 0.12s ease;
      }
      .item__del:hover { background: #ffe1ee; transform: scale(1.08); }
      .add-btn {
        margin-top: var(--sp-3); width: 100%; padding: var(--sp-3);
        border: 2px dashed var(--grape); border-radius: var(--radius-sm); background: transparent;
        color: var(--grape-text); font-family: var(--font-sans); font-weight: 700; font-size: var(--fs-body);
        cursor: pointer; transition: background 0.12s ease;
      }
      .add-btn:hover { background: var(--color-surface-sub); }

      /* 結果パネル */
      .result { position: sticky; top: var(--sp-3); display: flex; flex-direction: column; gap: var(--sp-4); }
      .total-card {
        background: var(--grad-total); border: 2px solid var(--color-border); border-radius: var(--radius);
        padding: var(--sp-4); text-align: center;
      }
      .total-card__label { font-weight: 700; color: var(--grape-text); }
      .total-card__value { font-size: var(--fs-num-lg); font-weight: 700; line-height: 1.05; margin-top: var(--sp-1); }
      .total-card__sub { color: var(--color-muted); margin-top: var(--sp-1); }

      .donut-card { padding: var(--sp-4); }
      .donut-card__title { font-size: var(--fs-h3); margin-bottom: var(--sp-3); display: inline-flex; align-items: center; gap: var(--sp-2); }
      .donut-card__body { display: grid; grid-template-columns: 170px 1fr; gap: var(--sp-4); align-items: center; }
      .donut { position: relative; width: 170px; height: 170px; }
      .donut__svg { width: 100%; height: 100%; }
      .donut__center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .donut__total { font-size: 1.15rem; font-weight: 700; }
      .legend { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--sp-1); }
      .legend__item { display: grid; grid-template-columns: 16px 1fr auto auto; align-items: center; gap: var(--sp-2); padding: 3px 0; }
      .legend__swatch { width: 14px; height: 14px; border-radius: 50%; }
      .legend__name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .legend__pct { min-width: 3.4rem; text-align: right; }
      .empty { color: var(--color-muted); text-align: center; padding: var(--sp-4) 0; }

      .site-footer { border-top: 2px solid var(--color-border); margin-top: var(--sp-6); padding: var(--sp-4) 0; }
      .site-footer__inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--sp-2); }

      @media (max-width: 820px) {
        .sim__grid { grid-template-columns: 1fr; }
        .result { position: static; }
      }
      @media (max-width: 480px) {
        .donut-card__body { grid-template-columns: 1fr; justify-items: center; }
        .item { grid-template-columns: 16px 1fr 7rem 32px; }
      }
      @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <div class="site-header__inner">
          <span class="site-header__logo">
            <span class="site-header__mark" aria-hidden="true">¥</span>
            支出チェック
          </span>
        </div>
      </header>

      <section class="hero">
        <h1 class="hero__title">毎月の支出を<br /><span class="accent">カラフルに</span>チェック！</h1>
        <p class="hero__lead">月を切り替えて、支出の項目を自由に追加・削除。入力するとすぐに内訳グラフが更新されます。</p>
      </section>

      <!-- 月切替 -->
      <div class="monthbar">
        <button class="monthbar__btn" data-prev aria-label="前の月">‹</button>
        <input type="month" class="monthbar__month num" data-month aria-label="表示する月" />
        <button class="monthbar__btn" data-next aria-label="次の月">›</button>
      </div>

      <section class="sim">
        <div class="sim__grid">
          <!-- 入力パネル -->
          <div class="card panel">
            <div class="panel__head">
              <h2 class="panel__title">📝 支出の項目</h2>
              <span class="caption" data-count></span>
            </div>
            <div class="items" data-items></div>
            <button class="add-btn" data-add>＋ 項目を追加</button>
          </div>

          <!-- 結果パネル -->
          <div class="result">
            <div class="total-card">
              <p class="total-card__label">この月の支出合計</p>
              <p class="num total-card__value" data-total aria-live="polite"></p>
              <p class="caption total-card__sub" data-total-sub></p>
            </div>

            <div class="card donut-card">
              <h3 class="donut-card__title">🍩 支出の内訳</h3>
              <div class="donut-card__body">
                <div class="donut">
                  <svg viewBox="0 0 42 42" class="donut__svg" role="img" aria-label="支出内訳の円グラフ">
                    <circle cx="21" cy="21" r="15.915" fill="none" stroke="var(--color-surface-sub)" stroke-width="6"></circle>
                    <g data-donut></g>
                  </svg>
                  <div class="donut__center">
                    <span class="caption">合計</span>
                    <span class="num donut__total" data-donut-total></span>
                  </div>
                </div>
                <ul class="legend" data-legend></ul>
                <p class="empty" data-empty hidden>項目に金額を入力すると<br />内訳が表示されます🎨</p>
              </div>
              <table class="sr-only" data-sr-table>
                <caption>支出内訳</caption>
                <thead><tr><th>項目</th><th>金額</th><th>割合</th></tr></thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <footer class="site-footer">
        <div class="site-footer__inner">
          <p class="caption">&copy; <span data-year></span> 支出チェック</p>
          <p class="caption">入力データはブラウザ内（localStorage）にのみ保存されます。</p>
        </div>
      </footer>
    </div>

    <script>
      (function () {
        'use strict';

        var STORAGE_KEY = 'expense-check:v2';
        var STORAGE_VERSION = 2;
        var PALETTE = ['c1', 'c2', 'c3', 'c4', 'c5', 'c6', 'c7', 'c8'];
        var yenFmt = new Intl.NumberFormat('ja-JP', { maximumFractionDigits: 0 });

        /* ===== ユーティリティ ===== */
        function normalizeAmount(v) {
          var n = typeof v === 'string' ? Number(v.replace(/[^0-9.-]/g, '')) : v;
          if (!isFinite(n) || n < 0) return 0;
          return Math.round(n);
        }
        function pct(value, total) { return total <= 0 ? 0 : (value / total) * 100; }
        function formatYen(v) { return '¥' + yenFmt.format(Math.round(v)); }
        function formatPct(v) {
          var r = Math.round(v * 10) / 10;
          return Number.isInteger(r) ? r + '%' : r.toFixed(1) + '%';
        }
        function uid() { return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
        function monthKey(d) {
          return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        }
        function monthLabel(key) {
          var p = key.split('-');
          return Number(p[0]) + '年' + Number(p[1]) + '月';
        }
        function shiftMonth(key, delta) {
          var p = key.split('-');
          var d = new Date(Number(p[0]), Number(p[1]) - 1 + delta, 1);
          return monthKey(d);
        }

        /* ===== 既定テンプレート ===== */
        function defaultItems() {
          var base = [
            { label: '食費', amount: 60000 },
            { label: '住居', amount: 80000 },
            { label: '水道光熱', amount: 18000 },
            { label: '通信', amount: 10000 },
            { label: '交通', amount: 12000 },
            { label: '娯楽', amount: 25000 }
          ];
          return base.map(function (b, i) {
            return { id: uid(), label: b.label, amount: b.amount, color: PALETTE[i % PALETTE.length] };
          });
        }

        /* ===== 状態 ===== */
        function defaultState() {
          var cur = monthKey(new Date());
          var months = {};
          months[cur] = { items: defaultItems() };
          return { current: cur, months: months };
        }
        function loadState() {
          try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return defaultState();
            var parsed = JSON.parse(raw);
            if (!parsed || parsed.v !== STORAGE_VERSION || !parsed.data) return defaultState();
            var d = parsed.data;
            if (!d.current || !d.months) return defaultState();
            return d;
          } catch (e) { return defaultState(); }
        }
        function saveState() {
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ v: STORAGE_VERSION, data: state })); } catch (e) {}
        }

        var state = loadState();
        var $ = function (sel) { return document.querySelector(sel); };

        /* 現在月のデータを取得（無ければ新規作成） */
        function currentMonth() {
          if (!state.months[state.current]) state.months[state.current] = { items: defaultItems() };
          return state.months[state.current];
        }
        function nextColor(items) {
          // 既存と被りにくいよう、使用数の少ない色を選ぶ
          var counts = {};
          PALETTE.forEach(function (c) { counts[c] = 0; });
          items.forEach(function (it) { if (counts[it.color] != null) counts[it.color]++; });
          var best = PALETTE[0], min = Infinity;
          PALETTE.forEach(function (c) { if (counts[c] < min) { min = counts[c]; best = c; } });
          return best;
        }

        /* ===== 描画（rAF合体） ===== */
        var pending = false;
        function scheduleRender() {
          if (pending) return;
          pending = true;
          requestAnimationFrame(function () { pending = false; render(); saveState(); });
        }
        function setText(sel, t) { var el = $(sel); if (el) el.textContent = t; }

        /* 項目リストは構造が変わる時だけ作り直す（編集中のフォーカス維持のため） */
        function buildItems() {
          var month = currentMonth();
          var html = '';
          month.items.forEach(function (it) {
            html +=
              '<div class="item" data-item="' + it.id + '">' +
                '<span class="item__dot" style="background:var(--' + it.color + ')"></span>' +
                '<input class="item__label" type="text" value="' + escapeAttr(it.label) + '" data-field="label" aria-label="項目名" />' +
                '<span class="item__amount"><span class="item__yen" aria-hidden="true">¥</span>' +
                  '<input class="item__input" type="text" inputmode="numeric" value="' + it.amount.toLocaleString('ja-JP') + '" data-field="amount" aria-label="金額" autocomplete="off" /></span>' +
                '<button class="item__del" data-del="' + it.id + '" aria-label="この項目を削除" title="削除">×</button>' +
              '</div>';
          });
          $('[data-items]').innerHTML = html;
          bindItems();
        }
        function escapeAttr(s) { return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

        function render() {
          var month = currentMonth();
          var items = month.items;
          var total = items.reduce(function (s, it) { return s + normalizeAmount(it.amount); }, 0);

          // 月表示
          var monthInput = $('[data-month]');
          if (monthInput && monthInput.value !== state.current) monthInput.value = state.current;
          setText('[data-count]', items.length + '項目');

          // 合計
          setText('[data-total]', formatYen(total));
          setText('[data-total-sub]', monthLabel(state.current) + ' の支出');
          setText('[data-donut-total]', formatYen(total));

          // ドーナツ
          var segs = [], acc = 0;
          items.forEach(function (it) {
            var amt = normalizeAmount(it.amount);
            if (amt <= 0) return;
            var ratio = pct(amt, total);
            segs.push({ color: it.color, dash: ratio + ' ' + (100 - ratio), offset: 25 - acc });
            acc += ratio;
          });
          var donut = $('[data-donut]');
          if (donut) {
            donut.innerHTML = segs.map(function (s) {
              return '<circle cx="21" cy="21" r="15.915" fill="none" stroke="var(--' + s.color + ')" stroke-width="6" pathLength="100" stroke-dasharray="' + s.dash + '" stroke-dashoffset="' + s.offset + '"></circle>';
            }).join('');
          }

          // 凡例
          var legend = $('[data-legend]');
          if (legend) {
            legend.innerHTML = items.filter(function (it) { return normalizeAmount(it.amount) > 0; }).map(function (it) {
              var amt = normalizeAmount(it.amount);
              return '<li class="legend__item"><span class="legend__swatch" style="background:var(--' + it.color + ')"></span><span class="legend__name">' + escapeHtml(it.label || '(無題)') + '</span><span class="num legend__amount">' + formatYen(amt) + '</span><span class="num legend__pct caption">' + formatPct(pct(amt, total)) + '</span></li>';
            }).join('');
          }
          var empty = $('[data-empty]');
          if (empty) empty.hidden = total > 0;

          // SRテーブル
          var srBody = $('[data-sr-table] tbody');
          if (srBody) {
            srBody.innerHTML = items.map(function (it) {
              var amt = normalizeAmount(it.amount);
              return '<tr><td>' + escapeHtml(it.label) + '</td><td>' + formatYen(amt) + '</td><td>' + formatPct(pct(amt, total)) + '</td></tr>';
            }).join('');
          }
        }
        function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        /* ===== 項目行のイベント ===== */
        function bindItems() {
          var rows = document.querySelectorAll('[data-item]');
          Array.prototype.forEach.call(rows, function (row) {
            var id = row.getAttribute('data-item');
            var labelInput = row.querySelector('[data-field="label"]');
            var amountInput = row.querySelector('[data-field="amount"]');
            if (labelInput) labelInput.addEventListener('input', function (e) {
              var it = findItem(id); if (it) it.label = e.target.value; scheduleRender();
            });
            if (amountInput) amountInput.addEventListener('input', function (e) {
              var it = findItem(id); if (it) it.amount = normalizeAmount(e.target.value); scheduleRender();
            });
            // 金額入力欄からフォーカスが外れたら千区切りに整形
            if (amountInput) amountInput.addEventListener('blur', function (e) {
              e.target.value = normalizeAmount(e.target.value).toLocaleString('ja-JP');
            });
          });
          var dels = document.querySelectorAll('[data-del]');
          Array.prototype.forEach.call(dels, function (btn) {
            btn.addEventListener('click', function () {
              var id = btn.getAttribute('data-del');
              var month = currentMonth();
              month.items = month.items.filter(function (it) { return it.id !== id; });
              buildItems(); scheduleRender();
            });
          });
        }
        function findItem(id) {
          var month = currentMonth();
          for (var i = 0; i < month.items.length; i++) if (month.items[i].id === id) return month.items[i];
          return null;
        }

        /* ===== 全体イベント ===== */
        function changeMonth(key) {
          state.current = key;
          currentMonth();
          buildItems(); render(); saveState();
        }

        $('[data-add]').addEventListener('click', function () {
          var month = currentMonth();
          month.items.push({ id: uid(), label: '', amount: 0, color: nextColor(month.items) });
          buildItems();
          // 追加した行のラベルにフォーカス
          var rows = document.querySelectorAll('[data-item]');
          var last = rows[rows.length - 1];
          if (last) last.querySelector('[data-field="label"]').focus();
          scheduleRender();
        });
        $('[data-prev]').addEventListener('click', function () { changeMonth(shiftMonth(state.current, -1)); });
        $('[data-next]').addEventListener('click', function () { changeMonth(shiftMonth(state.current, 1)); });
        $('[data-month]').addEventListener('change', function (e) {
          if (e.target.value) changeMonth(e.target.value);
        });

        var yearEl = $('[data-year]');
        if (yearEl) yearEl.textContent = String(new Date().getFullYear());

        buildItems();
        render();
        saveState();
      })();
    </script>
  </body>
</html>
